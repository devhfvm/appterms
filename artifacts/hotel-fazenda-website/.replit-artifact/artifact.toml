kind = "web"
previewPath = "/"
title = "Vale da Mantiqueira – Legal"
version = "1.0.0"
id = "artifacts/hotel-fazenda-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19637

[services.development]
run = "pnpm --filter @workspace/hotel-fazenda-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hotel-fazenda-website", "run", "build" ]
publicDir = "artifacts/hotel-fazenda-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19637"
BASE_PATH = "/"
